name: Web Portal CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f index.html && echo "✓ index.html"
          test -f dashboard.html && echo "✓ dashboard.html"
          test -f profiles.html && echo "✓ profiles.html"
          test -f profile-detail.html && echo "✓ profile-detail.html"
          test -f search.html && echo "✓ search.html"
          test -f account.html && echo "✓ account.html"
          test -f css/style.css && echo "✓ style.css"
          test -f js/auth.js && echo "✓ auth.js"
          test -f js/api.js && echo "✓ api.js"
          echo "All required files present ✓"